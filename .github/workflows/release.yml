name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PACKAGE_NAME: codex-cost
  BIN_NAME: ccost
  TAP_REPO: peterxcli/homebrew-tap

jobs:
  build-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    env:
      TARGET_AMD64: x86_64-unknown-linux-gnu
      TARGET_ARM64: aarch64-unknown-linux-gnu
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build targets
        run: |
          set -euo pipefail
          rustup target add "${TARGET_AMD64}" "${TARGET_ARM64}"
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Validate tag version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r --arg package "${PACKAGE_NAME}" '.packages[] | select(.name == $package) | .version')"
          if [ "${version}" != "${cargo_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --locked

      - name: Build
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${TARGET_AMD64}"
          cargo build --release --locked --target "${TARGET_ARM64}"

      - name: Package
        run: |
          set -euo pipefail
          package_asset() {
            local target="$1"
            local arch="$2"
            local asset="${BIN_NAME}-linux-${arch}.tar.gz"
            local staging
            staging="$(mktemp -d)"
            cp "target/${target}/release/${BIN_NAME}" "${staging}/${BIN_NAME}"
            tar -C "${staging}" -czf "dist/${asset}" "${BIN_NAME}"
            shasum -a 256 "dist/${asset}" > "dist/${asset}.sha256"
          }

          mkdir -p dist
          package_asset "${TARGET_AMD64}" amd64
          package_asset "${TARGET_ARM64}" arm64

      - name: Upload Linux assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: dist/*
          if-no-files-found: error

  build-macos:
    name: Build macOS binaries
    runs-on: macos-latest
    env:
      TARGET_ARM64: aarch64-apple-darwin
      TARGET_INTEL: x86_64-apple-darwin

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS build targets
        run: rustup target add "${TARGET_ARM64}" "${TARGET_INTEL}"

      - name: Validate tag version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r --arg package "${PACKAGE_NAME}" '.packages[] | select(.name == $package) | .version')"
          if [ "${version}" != "${cargo_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --locked

      - name: Build
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${TARGET_ARM64}"
          cargo build --release --locked --target "${TARGET_INTEL}"

      - name: Package
        run: |
          set -euo pipefail
          package_asset() {
            local target="$1"
            local asset="${BIN_NAME}-${target}.tar.gz"
            local staging
            staging="$(mktemp -d)"
            cp "target/${target}/release/${BIN_NAME}" "${staging}/${BIN_NAME}"
            tar -C "${staging}" -czf "dist/${asset}" "${BIN_NAME}"
            shasum -a 256 "dist/${asset}" > "dist/${asset}.sha256"
          }

          mkdir -p dist
          package_asset "${TARGET_ARM64}"
          package_asset "${TARGET_INTEL}"

      - name: Upload macOS assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release and tap
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Publish Homebrew tap release assets
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tap_tag="${BIN_NAME}-${GITHUB_REF_NAME}"
          if gh release view "${tap_tag}" --repo "${TAP_REPO}" >/dev/null 2>&1; then
            gh release upload "${tap_tag}" dist/${BIN_NAME}-*-apple-darwin.tar.gz --repo "${TAP_REPO}" --clobber
          else
            gh release create "${tap_tag}" dist/${BIN_NAME}-*-apple-darwin.tar.gz \
              --repo "${TAP_REPO}" \
              --target main \
              --title "${BIN_NAME} ${GITHUB_REF_NAME}" \
              --notes "Homebrew Cask binaries for ${BIN_NAME} ${GITHUB_REF_NAME}."
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cask_path="homebrew-tap/Casks/${BIN_NAME}.rb"
          legacy_cask_path="homebrew-tap/Casks/${PACKAGE_NAME}.rb"
          sha256_arm64="$(awk '{print $1}' "dist/${BIN_NAME}-aarch64-apple-darwin.tar.gz.sha256")"
          sha256_intel="$(awk '{print $1}' "dist/${BIN_NAME}-x86_64-apple-darwin.tar.gz.sha256")"
          mkdir -p "$(dirname "${cask_path}")"
          cat > "${cask_path}" <<EOF_CASK
          cask "${BIN_NAME}" do
            version "${version}"
            arch arm: "aarch64", intel: "x86_64"

            sha256 arm: "${sha256_arm64}",
                   intel: "${sha256_intel}"

            url "https://github.com/${TAP_REPO}/releases/download/${BIN_NAME}-v#{version}/${BIN_NAME}-#{arch}-apple-darwin.tar.gz"
            name "${BIN_NAME}"
            desc "Terminal UI for inspecting Codex session token usage and cost estimates"
            homepage "https://github.com/${GITHUB_REPOSITORY}"

            binary "${BIN_NAME}"
          end
          EOF_CASK
          ruby -pi -e 'gsub(/^ {10}/, "")' "${cask_path}"
          rm -f "${legacy_cask_path}"

      - name: Commit Homebrew tap update
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Casks/${BIN_NAME}.rb"
          if git ls-files --error-unmatch "Casks/${PACKAGE_NAME}.rb" >/dev/null 2>&1; then
            git rm -f "Casks/${PACKAGE_NAME}.rb"
          fi
          if git diff --cached --quiet; then
            echo "Homebrew cask already up to date."
            exit 0
          fi
          git commit -m "Update ${BIN_NAME} to ${GITHUB_REF_NAME#v}"
          git push
